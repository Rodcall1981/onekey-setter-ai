<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneKey - Setter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #000;
      line-height: 1.5;
      font-size: 14px;
    }
    input, textarea, button { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    button { cursor: pointer; transition: all 0.2s; }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    input:focus, textarea:focus { outline: none; border-color: #000 !important; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    #root { width: 100%; min-height: 100vh; }
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: 1fr; }
    .grid-cols-2 { grid-template-columns: 1fr 1fr; }
    .grid-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    @media (max-width: 1024px) {
      .lg\:col-span-1 { grid-column: auto; }
      .lg\:col-span-2 { grid-column: auto; }
      .grid { gap: 16px; }
    }
    @media (min-width: 1025px) {
      .lg\:col-span-1 { grid-column: span 1; }
      .lg\:col-span-2 { grid-column: span 2; }
      .lg\:grid-cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
